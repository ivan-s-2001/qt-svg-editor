<h1 mat-dialog-title>Импортировать общий path</h1>
<div mat-dialog-content>
  <div class="dialog-preview-row">
    <div class="dialog-preview">
      <app-path-preview [path]="data.path ?? ''"></app-path-preview>
    </div>
    <div class="dialog-copy">
      <p>Нажмите <b>Импортировать</b>, чтобы загрузить этот SVG path в редактор.</p>
      <p class="dialog-copy-muted">Текущие несохранённые изменения будут потеряны.</p>
    </div>
  </div>
</div>
<div mat-dialog-actions align="end">
  <button mat-flat-button (click)="onCancel()" color="primary">Отмена</button>
  <button mat-flat-button (click)="onConfirm()" color="accent">Импортировать</button>
</div>
