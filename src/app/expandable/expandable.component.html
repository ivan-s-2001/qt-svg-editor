<button type="button" class="title" (click)="toggle()">
    <span class="title-text">{{panelTitle}}</span>
    <span class="panel-info" *ngIf="panelInfo">{{panelInfo}}</span>
    <mat-icon>{{opened ? 'expand_less' : 'expand_more'}}</mat-icon>
</button>
<div *ngIf="opened" @openClose class="panel">
    <div #contentWrapper class="panel-content">
        <ng-content></ng-content>
    </div>
</div>
