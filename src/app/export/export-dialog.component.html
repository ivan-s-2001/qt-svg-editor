<h1 mat-dialog-title>Экспорт в SVG</h1>
<div mat-dialog-content>
  <div class="export-content">
    <div class="export-form">
      <div class="style-form-title">Стиль path</div>
      <div class="style-form-fill">
        <div>
          <mat-checkbox class="example-margin" [ngModel]="cfg.fill" (ngModelChange)="cfg.fill=$event;cfg.stroke=cfg.stroke||!$event">Заливка</mat-checkbox>
        </div>
        <mat-form-field>
          <mat-label>Цвет заливки</mat-label>
          <input matInput [(ngModel)]="cfg.fillColor" [disabled]="!cfg.fill">
        </mat-form-field>
      </div>
      <div class="style-form-stroke">
        <div>
          <mat-checkbox class="example-margin" [ngModel]="cfg.stroke" (ngModelChange)="cfg.stroke=$event;cfg.fill=cfg.fill||!$event">Обводка</mat-checkbox>
        </div>
        <div class="style-form-stroke-fields">
          <div class="style-form-stroke-field">
            <mat-form-field>
              <mat-label>Цвет обводки</mat-label>
              <input matInput [(ngModel)]="cfg.strokeColor" [disabled]="!cfg.stroke">
            </mat-form-field>
          </div>
          <div class="style-form-stroke-field">
            <mat-form-field>
              <mat-label>Толщина обводки</mat-label>
              <input matInput [(ngModel)]="cfg.strokeWidth" [disabled]="!cfg.stroke">
            </mat-form-field>
          </div>
        </div>
      </div>
      <div class="viewbox-form-title">
        <div>ViewBox</div>
        <button mat-flat-button (click)="refreshViewbox()" color="basic" class="reset-button">Сбросить</button>
      </div>
      <div class="viewbox-form-field">
        <mat-form-field>
          <mat-label>X</mat-label>
          <input matInput appFormatter [(numberValue)]="x">
        </mat-form-field>
      </div>
      <div class="viewbox-form-field">
        <mat-form-field>
          <mat-label>Y</mat-label>
          <input matInput appFormatter [(numberValue)]="y">
        </mat-form-field>
      </div>
      <div class="viewbox-form-field">
        <mat-form-field>
          <mat-label>Ширина</mat-label>
          <input matInput appFormatter formatterType="positive-float" [(numberValue)]="width">
        </mat-form-field>
      </div>
      <div class="viewbox-form-field">
        <mat-form-field>
          <mat-label>Высота</mat-label>
          <input matInput appFormatter formatterType="positive-float" [(numberValue)]="height">
        </mat-form-field>
      </div>
    </div>
    <div class="preview">
      <app-path-preview
        [x]="x"
        [y]="y"
        [width]="width"
        [height]="height"
        [path]="data.path"
        [fillColor]="cfg.fill?cfg.fillColor:'none'"
        [strokeColor]="cfg.stroke?cfg.strokeColor:'none'"
        [strokeWidth]="cfg.strokeWidth"
      ></app-path-preview>
    </div>
  </div>
</div>
<div mat-dialog-actions align="end">
  <button mat-flat-button (click)="onCancel()" color="primary">Закрыть</button>
  <button mat-flat-button (click)="onCopyToClipboard()" color="primary">Копировать SVG</button>
  <button mat-flat-button (click)="onExport()" color="accent">Скачать</button>
</div>
